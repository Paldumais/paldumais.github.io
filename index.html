<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paldumais Labs | Technology and Cybersecurity Blog</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <nav>
      <ul>
        <li><a href="#">{{#links}}<span>{{name}}</span>{{/links}}</a></li>
      </ul>
    </nav>
  </header>
  <main>
    <h1>Welcome to Paldumais Labs!</h1>
    <ul>
      {{#posts}}
      <li>
        <a href="{{url}}">{{title}}</a>
        <p>{{summary}}</p>
      </li>
      {{/posts}}
    </ul>
  </main>
  <script src="script.js"></script>
</body>
</html>
